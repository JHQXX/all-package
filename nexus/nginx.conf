# ============================================================
# Nginx 反向代理配置 + HTTPS
# ============================================================
# 文件路径：/usr/local/etc/nginx/servers/nexus.conf（macOS Homebrew）
# 复制到你的 Nginx 配置目录后重启 Nginx
# ============================================================

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name nexus.azhi-home.top;
    return 301 https://$server_name$request_uri;
}

# HTTPS 反向代理到 Nexus
server {
    listen 443 ssl http2;
    server_name nexus.azhi-home.top;

    # SSL 证书（用 Let's Encrypt 免费签）
    ssl_certificate /etc/letsencrypt/live/nexus.azhi-home.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus.azhi-home.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全 Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 客户端上传大小（Maven 上传大包需要）
    client_max_body_size 500M;
    client_body_buffer_size 128k;

    # 日志
    access_log /var/log/nginx/nexus-access.log;
    error_log /var/log/nginx/nexus-error.log;

    # ========================================
    # 关键安全：IP 白名单（可选，强烈建议）
    # ========================================
    # 取消下面注释并改成你的实际 IP 段
    # 比如只允许家里和公司：
    # allow 192.168.31.0/24;     # 家里 WiFi
    # allow 1.2.3.4;             # 公司公网 IP
    # deny all;

    # 代理到 Nexus（监听在 127.0.0.1:8081）
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（Nexus 某些功能需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点（不需要白名单）
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}