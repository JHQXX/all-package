server:
  port: 8080

spring:
  application:
    name: ${artifactId}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your_api_key_here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${LLM_MODEL:gpt-3.5-turbo}
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-ada-002

app:
  name: ${artifactId}
  version: 1.0.0

logging:
  level:
    root: INFO
    ${package}: DEBUG
    org.springframework.ai: INFO